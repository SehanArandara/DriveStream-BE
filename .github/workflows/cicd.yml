name: 🚀 DriveStream Backend Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # COMMON CI PIPELINE
  # ─────────────────────────────
  ci:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common.yml@main

    with:
      node_version: "20"
      image_name: drivestreamserver
      test_command: node -e "console.log('Tests Passed')"
      build_command: node -e "console.log('Build Successful')"

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─────────────────────────────
  # DEPLOY BACKEND
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ─────────────────────────────
  # NOTIFY TEAMS
  # ─────────────────────────────
  notify:
    name: 📢 Notify Teams
    runs-on: ubuntu-latest
    needs: deploy

    if: always()

    steps:
      - name: Prepare Metadata
        id: meta
        run: |
          echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "time=$(TZ='Asia/Colombo' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "workflow_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "commit_url=https://github.com/${{ github.repository }}/commit/${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set Status
        id: status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "STATUS=SUCCESS" >> $GITHUB_OUTPUT
            echo "ICON=✅" >> $GITHUB_OUTPUT
            echo "COLOR=00FF00" >> $GITHUB_OUTPUT
          else
            echo "STATUS=FAILED" >> $GITHUB_OUTPUT
            echo "ICON=❌" >> $GITHUB_OUTPUT
            echo "COLOR=FF0000" >> $GITHUB_OUTPUT
          fi

      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"${{ steps.status.outputs.COLOR }}\",
            \"summary\": \"DriveStream CI/CD Pipeline\",

            \"sections\": [
              {
                \"activityTitle\": \"${{ steps.status.outputs.ICON }} Deployment ${{ steps.status.outputs.STATUS }}\",
                \"activitySubtitle\": \"DriveStream CI/CD Notification\",

                \"facts\": [
                  { \"name\": \"📦 Repository\", \"value\": \"${{ github.repository }}\" },
                  { \"name\": \"🌿 Branch\", \"value\": \"${{ github.ref_name }}\" },
                  { \"name\": \"👤 Triggered By\", \"value\": \"${{ github.actor }}\" },
                  { \"name\": \"🔄 Workflow\", \"value\": \"${{ github.workflow }}\" },
                  { \"name\": \"🆔 Run Number\", \"value\": \"#${{ github.run_number }}\" },
                  { \"name\": \"🔖 Commit SHA\", \"value\": \"${{ steps.meta.outputs.short_sha }}\" },
                  { \"name\": \"⏰ Time (SL)\", \"value\": \"${{ steps.meta.outputs.time }}\" },
                  { \"name\": \"🚀 Status\", \"value\": \"${{ steps.status.outputs.STATUS }}\" }
                ],

                \"markdown\": true
              }
            ],

            \"potentialAction\": [
              {
                \"@type\": \"OpenUri\",
                \"name\": \"🔍 View Workflow\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"${{ steps.meta.outputs.workflow_url }}\"
                  }
                ]
              },
              {
                \"@type\": \"OpenUri\",
                \"name\": \"📝 View Commit\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"${{ steps.meta.outputs.commit_url }}\"
                  }
                ]
              }
            ]
          }" \
          $TEAMS_WEBHOOK