name: 🚀 DriveStream Backend Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # COMMON CI PIPELINE
  # ─────────────────────────────
  ci:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common.yml@main

    with:
      node_version: "20"
      image_name: drivestreamserver
      test_command: npm test
      build_command: node -e "console.log('Build Passed')"

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─────────────────────────────
  # DEPLOY BACKEND
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ─────────────────────────────
  # NOTIFY
  # ─────────────────────────────
  notify:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common-notify.yml@main
    needs: deploy

    with:
      status: ${{ needs.deploy.result }}
      actor: ${{ github.actor }}
      branch: ${{ github.ref_name }}
      workflow_name: ${{ github.workflow }}
      run_number: ${{ github.run_number }}
      repository: ${{ github.repository }}
      commit_sha: ${{ github.sha }}

    secrets:
      TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}