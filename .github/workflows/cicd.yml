name: 🚀 CI/CD Pipeline - DriveStream Backend

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: drivestream-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # 4. Run basic check (optional)
      - name: ✅ Run App Check
        run: node -e "console.log('App build check passed')"

      # 5. Docker Login
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build Docker Image
      - name: 🐳 Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      # 7. Push Docker Image
      - name: 📤 Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      # 8. Setup kubectl
      - name: ☸️ Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      # 9. Set Kubeconfig
      - name: 🔑 Configure Kubernetes
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 10. Deploy to Kubernetes
      - name: 🚀 Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment drivestream-backend