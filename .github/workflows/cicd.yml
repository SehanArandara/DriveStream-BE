
name: 🚀 DriveStream CI/CD Pipeline - Backend

on:
  push:
    branches: [main, develop, cicd-pipeline]
  pull_request:
    branches: [main, develop, cicd-pipeline]

env:
  IMAGE_NAME: drivestreamserver
  NODE_VERSION: "20"

# Cancel stale runs on the same branch immediately
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # 1. INSTALL
  # Caches node_modules so every downstream job skips npm install entirely.
  # ─────────────────────────────
  install:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci   # ci is faster and deterministic vs npm install

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}



 # ─────────────────────────────
  # 2. LINT (non-blocking) + TEST
  # Run in parallel — both only need the node_modules cache, not each other.
  # Split into separate jobs so lint failures don't swallow test output.
  # ─────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Tests
        run: node -e "console.log('Build successful')"


  # ─────────────────────────────
  # 3. BUILD APPLICATION
  # ─────────────────────────────
  build:
    name: 🏗️ Build App
    runs-on: ubuntu-latest
    needs: test   
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build App
        run: node -e "console.log('Build successful')"


  # ─────────────────────────────
  # 4. DOCKER BUILD + PUSH
  # ─────────────────────────────
  docker:
    name: 🐳 Build Image and Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest


  # ─────────────────────────────
  # 5. APPROVAL GATE
  # ─────────────────────────────
  approval:
    name: 🔐 Approval Gate
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: production
    steps:
      - name: Approval Granted
        run: echo "Approved. Ready for deployment."

      - name: Post Approval Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "✅ Approval granted. Ready for production deployment."
            })

  # ─────────────────────────────
  # 6. DEPLOY TO VERCEL
  # Env sync uses parallel curl calls (background &) instead of sequential,
  # cutting sync time from ~11s to ~2s for 11 variables.
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: approval
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Sync Environment Variables to Vercel
        run: |
          BASE_URL="https://api.vercel.com/v10/projects/${{ secrets.VERCEL_PROJECT_ID }}/env"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          # Fetch all existing env vars once (not once per key)
          ALL_ENVS=$(curl -s -X GET "$BASE_URL" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")

          sync_env() {
            KEY="$1"
            VALUE="$2"

            EXISTING_ID=$(echo "$ALL_ENVS" | python3 -c "
          import sys, json
          try:
            data = json.load(sys.stdin)
            match = next((e for e in data.get('envs', []) if e['key'] == '$KEY' and 'production' in e.get('target', [])), None)
            print(match['id'] if match else '')
          except:
            print('')
          ")

            JSON_VALUE=$(echo "$VALUE" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip()))")

            if [ -n "$EXISTING_ID" ]; then
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH "$BASE_URL/$EXISTING_ID" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"value\": $JSON_VALUE, \"target\": [\"production\"], \"type\": \"encrypted\"}")
              echo "✅ Updated  $KEY (HTTP $HTTP_STATUS)"
            else
              HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$BASE_URL" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"$KEY\", \"value\": $JSON_VALUE, \"target\": [\"production\"], \"type\": \"encrypted\"}")
              echo "✅ Created  $KEY (HTTP $HTTP_STATUS)"
            fi
          }

          # Fire all syncs in parallel, then wait for all to complete
          sync_env "PORT"                  "${{ secrets.PORT }}"                  &
          sync_env "MONGODB_URI"           "${{ secrets.MONGODB_URI }}"           &
          sync_env "JWT_SECRET"            "${{ secrets.JWT_SECRET }}"            &
          sync_env "JWT_EXPIRES_IN"        "${{ secrets.JWT_EXPIRES_IN }}"        &
          sync_env "STRIPE_SECRET_KEY"     "${{ secrets.STRIPE_SECRET_KEY }}"     &
          sync_env "STRIPE_WEBHOOK_SECRET" "${{ secrets.STRIPE_WEBHOOK_SECRET }}" &
          sync_env "TWILIO_ACCOUNT_SID"    "${{ secrets.TWILIO_ACCOUNT_SID }}"    &
          sync_env "TWILIO_AUTH_TOKEN"     "${{ secrets.TWILIO_AUTH_TOKEN }}"     &
          sync_env "TWILIO_PHONE_NUMBER"   "${{ secrets.TWILIO_PHONE_NUMBER }}"   &
          sync_env "OPENAI_API_KEY"        "${{ secrets.OPENAI_API_KEY }}"        &
          sync_env "CLIENT_URL"            "${{ secrets.CLIENT_URL }}"            &
          wait   # block until all background syncs finish

      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ─────────────────────────────
  # 7. MICROSOFT TEAMS NOTIFICATION
  # ─────────────────────────────
  notify-teams:
    name: 📢 Notify Teams Channel
    runs-on: ubuntu-latest
    needs: deploy   

    if: always()

    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |

          # ─────────────────────────────
          # PIPELINE STATUS
          # ─────────────────────────────
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="SUCCESS"
            COLOR="00FF00"
            ICON="✅"
          else
            STATUS="FAILED"
            COLOR="FF0000"
            ICON="❌"
          fi

          # ─────────────────────────────
          # BUILD DETAILS
          # ─────────────────────────────
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA=$(echo $COMMIT_SHA | cut -c1-7)

          WORKFLOW="${{ github.workflow }}"
          RUN_NUMBER="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"

          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

          WORKFLOW_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          DATE=$(date)

          # ─────────────────────────────
          # TEAMS MESSAGE PAYLOAD
          # ─────────────────────────────
          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"DriveStream CI/CD Pipeline\",

            \"sections\": [
              {
                \"activityTitle\": \"$ICON DriveStream Deployment $STATUS\",
                \"activitySubtitle\": \"GitHub Actions CI/CD Notification\",

                \"facts\": [
                  {
                    \"name\": \"📦 Repository\",
                    \"value\": \"$REPO\"
                  },
                  {
                    \"name\": \"🌿 Branch\",
                    \"value\": \"$BRANCH\"
                  },
                  {
                    \"name\": \"👤 Triggered By\",
                    \"value\": \"$ACTOR\"
                  },
                  {
                    \"name\": \"🔄 Workflow\",
                    \"value\": \"$WORKFLOW\"
                  },
                  {
                    \"name\": \"🆔 Run Number\",
                    \"value\": \"#$RUN_NUMBER\"
                  },
                  {
                    \"name\": \"🐳 Docker Image\",
                    \"value\": \"$IMAGE\"
                  },
                  {
                    \"name\": \"🚀 Environment\",
                    \"value\": \"Production\"
                  },
                  {
                    \"name\": \"📝 Commit\",
                    \"value\": \"$COMMIT_MESSAGE\"
                  },
                  {
                    \"name\": \"🔖 Commit SHA\",
                    \"value\": \"$SHORT_SHA\"
                  },
                  {
                    \"name\": \"⏰ Time\",
                    \"value\": \"$DATE\"
                  }
                ],

                \"markdown\": true
              }
            ],

            \"potentialAction\": [
              {
                \"@type\": \"OpenUri\",
                \"name\": \"🔍 View Workflow\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$WORKFLOW_URL\"
                  }
                ]
              },
              {
                \"@type\": \"OpenUri\",
                \"name\": \"📝 View Commit\",
                \"targets\": [
                  {
                    \"os\": \"default\",
                    \"uri\": \"$COMMIT_URL\"
                  }
                ]
              }
            ]
          }" \
          $TEAMS_WEBHOOK