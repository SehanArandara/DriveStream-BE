name: 🚀 DriveStream Backend Pipeline

on:
  push:
    branches: [main, develop, cicd-pipeline]

  pull_request:
    branches: [main, develop, cicd-pipeline]

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────
  # COMMON CI PIPELINE
  # ─────────────────────────────
  ci:
    uses: NADUNSANDEEPA/DriveStream-CommonCICD/.github/workflows/common.yml@main

    with:
      node_version: "20"
      image_name: drivestreamserver
      test_command: node -e "console.log('Tests Passed')"
      build_command: node -e "console.log('Build Successful')"

    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  # ─────────────────────────────
  # DEPLOY BACKEND
  # ─────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

  # ─────────────────────────────
  # NOTIFY TEAMS
  # ─────────────────────────────
  notify:
    name: 📢 Notify Teams
    runs-on: ubuntu-latest
    needs: deploy

    if: always()

    steps:
      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            STATUS="SUCCESS"
            COLOR="00FF00"
            ICON="✅"
          else
            STATUS="FAILED"
            COLOR="FF0000"
            ICON="❌"
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"https://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"Backend Deployment\",

            \"sections\": [{
              \"activityTitle\": \"$ICON Backend Deployment $STATUS\",

              \"facts\": [
                {
                  \"name\": \"Repository\",
                  \"value\": \"${{ github.repository }}\"
                },
                {
                  \"name\": \"Branch\",
                  \"value\": \"${{ github.ref_name }}\"
                },
                {
                  \"name\": \"Triggered By\",
                  \"value\": \"${{ github.actor }}\"
                }
              ],

              \"markdown\": true
            }]
          }" \
          $TEAMS_WEBHOOK