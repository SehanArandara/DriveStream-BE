apiVersion: apps/v1
kind: Deployment
metadata:
  name: drivestream-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: drivestream-backend
  template:
    metadata:
      labels:
        app: drivestream-backend
    spec:
      containers:
        - name: drivestream-backend
          image: YOUR_DOCKER_USERNAME/drivestream-server:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"