# k8s/staging/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drivestream-server
  namespace: drivestream-staging
  labels:
    app: drivestream-server
    env: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drivestream-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: drivestream-server
        env: staging
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: drivestream-server
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: drivestream-secrets-staging
          env:
            - name: NODE_ENV
              value: "staging"
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: v1
kind: Service
metadata:
  name: drivestream-server-svc
  namespace: drivestream-staging
spec:
  selector:
    app: drivestream-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drivestream-ingress-staging
  namespace: drivestream-staging
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging-api.drivestream.io
      secretName: drivestream-staging-tls
  rules:
    - host: staging-api.drivestream.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drivestream-server-svc
                port:
                  number: 80