# k8s/production/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drivestream-server
  namespace: drivestream-prod
  labels:
    app: drivestream-server
    env: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: drivestream-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deploys
  template:
    metadata:
      labels:
        app: drivestream-server
        env: production
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: drivestream-server
          image: IMAGE_PLACEHOLDER   # Replaced by CI with real tag
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - secretRef:
                name: drivestream-secrets   # kubectl create secret generic drivestream-secrets --from-env-file=.env
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]   # Allow load-balancer drain
      imagePullSecrets:
        - name: ghcr-pull-secret
---
apiVersion: v1
kind: Service
metadata:
  name: drivestream-server-svc
  namespace: drivestream-prod
spec:
  selector:
    app: drivestream-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drivestream-ingress
  namespace: drivestream-prod
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.drivestream.io
      secretName: drivestream-tls
  rules:
    - host: api.drivestream.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: drivestream-server-svc
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: drivestream-hpa
  namespace: drivestream-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: drivestream-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80